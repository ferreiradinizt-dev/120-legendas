{num:87,cat:"economia",catLabel:"📊 Economia BR",hook:"O que é o Copom e por que a reunião dele muda o preço de tudo",text:`O que é o Copom e por que a reunião dele muda o preço de tudo.

<script>
function renderCards(filter,search){
  filter=filter||'all'; search=(search||'').toLowerCase();
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const catColors={carro:'#00D68F',dinheiro:'#FFD600',imposto:'#FF9500',mentalidade:'#A855F7',economia:'#4D9FFF',comportamento:'#FF6B9D',viral:'#FF3B3B'};
  let count=0;
  legends.forEach(l=>{
    if(filter!=='all'&&l.cat!==filter) return;
    if(search&&!l.hook.toLowerCase().includes(search)&&!l.text.toLowerCase().includes(search)) return;
    count++;
    const color=catColors[l.cat]||'#FFD600';
    const card=document.createElement('div');
    card.className='legend-card';
    card.innerHTML=`<div class="card-top"><div class="card-num">${String(l.num).padStart(3,'0')}</div><div class="card-meta"><div class="card-category" style="color:${color}">${l.catLabel}</div><div class="card-hook">${l.hook}</div></div><button class="copy-btn">📋</button></div><div class="card-body"><div class="legend-text">${fmt(l.text)}</div></div>`;
    card.querySelector('.copy-btn').addEventListener('click',e=>{e.stopPropagation();cp(l.text);});
    card.addEventListener('click',()=>cp(l.text));
    grid.appendChild(card);
  });
  if(!count) grid.innerHTML='<div class="no-results">Nenhuma legenda encontrada para essa busca.</div>';
}
function fmt(t){return t.split('\n').map((line,i)=>{if(i===0)return`<span class="hook-line">${line}</span>`;if(line.includes('📍')||line.includes('📲')||line.startsWith('#'))return`<span class="cta-line">${line}</span>`;return line;}).join('\n');}
function cp(text){navigator.clipboard.writeText(text).then(()=>{const t=document.getElementById('copy-toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);});}
let currentFilter='all';
function filterCards(cat,btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentFilter=cat;renderCards(cat,document.querySelector('.search-input').value);}
function searchCards(val){renderCards(currentFilter,val);}
renderCards();
</script>
